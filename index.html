<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#91dce7" />
  <title>风筝邮差 · Pastel Flight</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main>
    <canvas id="game" aria-label="风筝邮差游戏画面"></canvas>
    <div class="controls" aria-label="游戏控制">
      <button id="restart" title="重新开始" aria-label="重新开始">↻</button>
      <button id="sound" title="声音" aria-label="切换声音">♪</button>
    </div>
    <section id="start" aria-label="开始游戏">
      <div class="start-card">
        <div class="mascot"><i></i><b></b></div>
        <p class="eyebrow">A SMALL LETTER, A WIDE SKY</p>
        <h1>一封信，正在等风</h1>
        <p class="intro">沿着柔软山丘积蓄动能，扇动翅膀，飞向下一段晴空。</p>
        <button id="play">开始送信 <span>→</span></button>
        <small>空格 / 鼠标 / 触摸屏 · 按 D 显示物理调试</small>
      </div>
    </section>
  </main>
  <script src="renderer.js"></script>
  <script src="game.js"></script>
</body>
</html>
