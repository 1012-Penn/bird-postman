<!doctype html>
<html lang="zh-CN"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>风筝邮差 — Demo</title><link rel="stylesheet" href="style.css"/></head>
<body><main><canvas id="game" aria-label="风筝邮差游戏画面"></canvas><section id="hud"><div class="brand">风筝邮差 <span>DEMO</span></div><div class="score"><small>今日里程</small><strong id="score">0000</strong><em id="combo">×1</em></div><div class="hint" id="hint">按住 <b>空格</b> 或 <b>鼠标</b> 贴地蓄力<br><span>松开，借山坡飞向天空</span></div><button id="restart" aria-label="重新开始" title="重新开始">↻</button><button id="sound" aria-label="切换声音">♪</button></section><div id="start"><div class="card"><div class="bird"></div><h1>一封信，正在等风</h1><p>按住贴紧山坡蓄力，松开后让小鸟借势飞向天空。</p><button id="play">开始送信</button><small>空格 / 鼠标 / 触摸屏</small></div></div></main><script src="game.js"></script></body></html>
